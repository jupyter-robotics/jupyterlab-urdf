name: Build

on:
  push:
    branches: main
  pull_request:
    branches: '*'

defaults:
  run:
    shell: bash -el {0}

jobs:

#------------------------------------------------------------------------------#
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up environment
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: urdf
        environment-file: environment.yml
        init-shell: bash

    - name: Lint the extension
      run: |
        jlpm
        jlpm run lint:check

    - name: Test the extension
      run: jlpm run test

    - name: Build the extension
      run: |
        python -m pip install .[test]
        jupyter labextension list
        jupyter labextension list 2>&1 | grep -ie "jupyterlab-urdf.*OK"
        python -m jupyterlab.browser_check

    - name: JupyterLite integration
      run: |
        jupyter lite build \
          --contents examples \
          --output-dir jupyterlite_urdf

    - name: Upload JupyterLite artifacts
      uses: actions/upload-pages-artifact@v4
      with:
        path: jupyterlite_urdf/

    - name: Package the extension
      run: |
        python -m build
        pip uninstall -y "jupyterlab_urdf" jupyterlab

    - name: Upload extension packages
      uses: actions/upload-artifact@v6
      with:
        name: extension-packages
        path: dist/jupyterlab_urdf*
        if-no-files-found: error

#------------------------------------------------------------------------------#
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: jupyterlite-artifacts
          preview: false # One day this shall work

#------------------------------------------------------------------------------#
  test-isolated:
    name: Isolated tests
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up environment
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: urdf-isolated
        init-shell: bash
        create-args: >-
          python
          jupyterlab>=4.0

    - name: Download extension package
      uses: actions/download-artifact@v7
      with:
        name: extension-packages

    - name: Install and test
      run: |
        pip install jupyterlab_urdf*.whl
        jupyter labextension list
        jupyter labextension list 2>&1 | grep -ie "jupyterlab-urdf.*OK"
        python -m jupyterlab.browser_check --no-browser-test

#------------------------------------------------------------------------------#
  test-integration:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest

    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up environment
      uses: mamba-org/setup-micromamba@v2
      with:
        environment-name: urdf-integration
        init-shell: bash
        create-args: >-
          python
          jupyterlab>=4.0

    - name: Download extension package
      uses: actions/download-artifact@v7
      with:
        name: extension-packages

    - name: Install the extension
      run: |
        pip install jupyterlab_urdf*.whl
        jupyter labextension list

    - name: Install dependencies
      working-directory: ui-tests
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      run: jlpm install

    - name: Set up browser cache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/pw-browsers
        key: ${{ runner.os }}-${{ hashFiles('ui-tests/yarn.lock') }}

    - name: Install browser
      run: jlpm playwright install chromium
      working-directory: ui-tests

    - name: Execute integration tests
      working-directory: ui-tests
      run: jlpm playwright test

    - name: Upload playwright test report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: jupyterlab_urdf-playwright-tests
        path: |
          ui-tests/test-results
          ui-tests/playwright-report

#------------------------------------------------------------------------------#
  check_links:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      - uses: jupyterlab/maintainer-tools/.github/actions/check-links@v1
